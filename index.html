<!DOCTYPE html>
<html lang="en"><head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BS Announcements</title>
    <link rel="icon" type="image/png" href="BS-Announcements-Icon.png">
    <style>
        :root {
            --bs-blue: #00d4ff;
            --bs-red: #ff003c;
            --bg-dark: #070709;
            --card-bg: #111115;
            --text-main: #e2e8f0;
            --text-muted: #64748b;
            --glow-blue: 0 0 15px rgba(0, 212, 255, 0.3);
            --glow-red: 0 0 15px rgba(255, 0, 60, 0.3);
        }

        * { box-sizing: border-box; }

        body {
            background-color: var(--bg-dark);
            color: var(--text-main);
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            margin: 0;
            padding: 0;
            line-height: 1.6;
        }

        /* HEADER & BRANDING NAVIGATION */
        header.global-nav {
            background: rgba(17, 17, 21, 0.8);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid #1f1f2e;
            position: sticky;
            top: 0;
            z-index: 100;
            padding: 15px 20px;
        }

        .nav-container {
            max-width: 800px;
            margin: 0 auto;
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .nav-logo {
            width: 40px;
            height: 40px;
            object-fit: contain;
            filter: drop-shadow(var(--glow-blue));
        }

        .nav-title {
            font-size: 1.25rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            font-weight: 800;
            color: #ffffff;
            margin: 0;
            text-shadow: var(--glow-blue);
        }

        /* TIMELINE STRUCTURE */
        main {
            max-width: 800px;
            margin: 40px auto;
            padding: 0 20px;
        }

        article {
            background: var(--card-bg);
            border: 1px solid #1f1f2e;
            border-radius: 12px;
            padding: 30px;
            margin-bottom: 35px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            transition: transform 0.2s target, border-color 0.2s;
        }

        article:hover {
            border-color: #2e2e45;
        }

        .byline {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 20px;
        }

        .pfp {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            object-fit: cover;
            border: 1px solid var(--bs-blue);
        }

        .pfp.hidden { display: none; }

        .byline span {
            font-size: 0.85rem;
            color: var(--text-muted);
        }

        .author {
            color: #ffffff;
            font-weight: 600;
        }

        h2 {
            font-size: 1.5rem;
            color: #ffffff;
            margin: 0 0 15px 0;
            font-weight: 700;
            letter-spacing: -0.5px;
        }

        /* RE-ENGINEERED MEDIA PREVIEW MANAGEMENT */
        .album-grid {
            position: relative;
            width: 100%;
            background: #050507;
            border-radius: 8px;
            border: 1px solid #1f1f2e;
            margin-bottom: 20px;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
        }

        .announcement-img {
            max-width: 100%;
            max-height: 480px;
            display: block;
            object-fit: contain; /* Prevents any structural cropping */
        }

        /* FLOATING ACTION OVERLAY BUTTON */
        .view-all-btn {
            position: absolute;
            right: 20px;
            bottom: 20px;
            background: rgba(0, 0, 0, 0.85);
            color: #ffffff;
            border: 1px solid var(--bs-blue);
            padding: 10px 18px;
            font-size: 0.8rem;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 1px;
            border-radius: 6px;
            cursor: pointer;
            backdrop-filter: blur(4px);
            box-shadow: var(--glow-blue);
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            gap: 8px;
            z-index: 5;
        }

        .view-all-btn:hover {
            background: var(--bs-blue);
            color: #000000;
            box-shadow: 0 0 20px rgba(0, 212, 255, 0.6);
        }

        .hidden-album-pool {
            display: none;
        }

        /* BODY CONTENT MARKUP */
        .article-body-content {
            font-size: 1rem;
            color: #cbd5e1;
        }

        .article-body-content p { margin: 0 0 12px 0; }
        .article-body-content p:last-child { margin-bottom: 0; }

        /* LIGHTBOX MODAL CONTAINER SYSTEMS */
        .lightbox-modal {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(4, 4, 6, 0.95);
            z-index: 1000;
            justify-content: center;
            align-items: center;
            opacity: 0;
            transition: opacity 0.25s ease;
        }

        .lightbox-modal.show {
            display: flex;
            opacity: 1;
        }

        .lightbox-content-wrapper {
            position: relative;
            max-width: 90%;
            max-height: 85%;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .lightbox-viewer-img {
            max-width: 100%;
            max-height: 85vh;
            object-fit: contain;
            border-radius: 4px;
            box-shadow: 0 0 30px rgba(0,0,0,0.8);
        }

        /* LIGHTBOX NAVIGATION CORES */
        .lightbox-btn {
            position: absolute;
            background: rgba(17, 17, 21, 0.7);
            border: 1px solid #2e2e3f;
            color: #ffffff;
            width: 50px; height: 50px;
            border-radius: 50%;
            font-size: 1.5rem;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: all 0.2s;
            user-select: none;
            z-index: 1010;
        }

        .lightbox-btn:hover {
            border-color: var(--bs-blue);
            color: var(--bs-blue);
            background: #111115;
            box-shadow: var(--glow-blue);
        }

        .lightbox-prev { left: -75px; }
        .lightbox-next { right: -75px; }
        .lightbox-close { top: -60px; right: 0; border-color: var(--bs-red); color: var(--bs-red); }
        .lightbox-close:hover { background: var(--bs-red); color: #fff; box-shadow: var(--glow-red); }

        .lightbox-counter {
            position: absolute;
            bottom: -40px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--text-muted);
        }

        /* Responsive Layout Overrides */
        @media (max-width: 992px) {
            .lightbox-prev { left: 20px; bottom: 20px; top: auto; }
            .lightbox-next { right: 20px; bottom: 20px; top: auto; }
            .lightbox-close { top: 20px; right: 20px; }
        }
    </style>
</head>
<body>

    <!-- NAV BAR -->
    <header class="global-nav">
        <div class="nav-container">
            <img src="BS-Announcements-Icon.png" class="nav-logo" alt="Logo">
            <h1 class="nav-title">BS Announcements</h1>
        </div>
    </header>

    <!-- ANNOUNCEMENT HUB MAIN FEED CONTAINER -->

    <!-- LIGHTBOX SYSTEM INLINE LAYER INFRASTRUCTURE -->
    <div id="globalLightbox" class="lightbox-modal" onclick="closeLightbox()">
        <button class="lightbox-btn lightbox-close" onclick="closeLightbox(); event.stopPropagation();">×</button>
        <button id="lightboxPrev" class="lightbox-btn lightbox-prev" onclick="navigateLightbox(-1); event.stopPropagation();">❮</button>
        
        <div class="lightbox-content-wrapper" onclick="event.stopPropagation();">
            <img id="lightboxTargetImg" class="lightbox-viewer-img" src="" alt="Active View">
            <div id="lightboxCounter" class="lightbox-counter">1 / 1</div>
        </div>

        <button id="lightboxNext" class="lightbox-btn lightbox-next" onclick="navigateLightbox(1); event.stopPropagation();">❯</button>
    </div>

    <!-- ACTIVE SYSTEM SCRIPT LOGIC CORE -->
    <script><br>        const MAX_POSTS_LIMIT = 15; // Track limits handled dynamically via CMS engine<br><br>        let activeImageArray = [];<br>        let activeImageIndex = 0;<br><br>        function initLightbox(gridElement) {<br>            activeImageArray = [];<br>            activeImageIndex = 0;<br><br>            // Extract primary image node<br>            const primaryImg = gridElement.querySelector('.announcement-img');<br>            if (primaryImg) activeImageArray.push(primaryImg.src);<br><br>            // Extract downstream imagery references hidden in pool wrappers<br>            const structuralPool = gridElement.querySelectorAll('.hidden-album-pool .announcement-img');<br>            structuralPool.forEach(img => activeImageArray.push(img.src));<br><br>            if (activeImageArray.length === 0) return;<br><br>            // Configure Lightbox layout configurations dynamically<br>            const prevBtn = document.getElementById('lightboxPrev');<br>            const nextBtn = document.getElementById('lightboxNext');<br><br>            if (activeImageArray.length <= 2) {<br>                // If there are exactly two images (or somehow just one), do not provide slider transformation control triggers<br>                prevBtn.style.display = 'none';<br>                nextBtn.style.display = 'none';<br>            } else {<br>                prevBtn.style.display = 'flex';<br>                nextBtn.style.display = 'flex';<br>            }<br><br>            renderLightboxFrame();<br>            <br>            const modal = document.getElementById('globalLightbox');<br>            modal.style.display = 'flex';<br>            setTimeout(() => modal.classList.add('show'), 10);<br>            document.body.style.overflow = 'hidden';<br>        }<br><br>        function renderLightboxFrame() {<br>            document.getElementById('lightboxTargetImg').src = activeImageArray[activeImageIndex];<br>            document.getElementById('lightboxCounter').innerText = `${activeImageIndex + 1} / ${activeImageArray.length}`;<br>        }<br><br>        function navigateLightbox(direction) {<br>            activeImageIndex += direction;<br>            if (activeImageIndex >= activeImageArray.length) activeImageIndex = 0;<br>            if (activeImageIndex < 0) activeImageIndex = activeImageArray.length - 1;<br>            renderLightboxFrame();<br>        }<br><br>        function closeLightbox() {<br>            const modal = document.getElementById('globalLightbox');<br>            modal.classList.remove('show');<br>            setTimeout(() => modal.style.display = 'none', 250);<br>            document.body.style.overflow = '';<br>        }<br><br>        // Trap Keyboard Navigation Arrays safely<br>        document.addEventListener('keydown', (e) => {<br>            const modal = document.getElementById('globalLightbox');<br>            if (!modal.classList.contains('show')) return;<br>            <br>            if (e.key === 'Escape') closeLightbox();<br>            if (activeImageArray.length > 2) {<br>                if (e.key === 'ArrowRight') navigateLightbox(1);<br>                if (e.key === 'ArrowLeft') navigateLightbox(-1);<br>            }<br>        });<br>    </script>


</body></html>
