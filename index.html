<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Beat Saber Hub</title>
    <style>
        :root {
            --bs-blue: #00d4ff;
            --bs-red: #ff003c;
            --bg-dark: #050505;
            --card-bg: #121217;
            --text-main: #e0e0e0;
            --text-dim: #999;
            --glow-blue: 0 0 15px rgba(0, 212, 255, 0.3);
            --glow-red: 0 0 15px rgba(255, 0, 60, 0.3);
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-main);
            font-family: 'Segoe UI', system-ui, sans-serif;
            margin: 0;
            line-height: 1.6;
        }

        nav {
            background: rgba(0, 0, 0, 0.8);
            border-bottom: 2px solid var(--bs-blue);
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 100;
            backdrop-filter: blur(10px);
        }

        .nav-logo {
            font-weight: 900;
            letter-spacing: 2px;
            color: #fff;
            text-transform: uppercase;
        }

        .container {
            max-width: 900px;
            margin: 40px auto;
            padding: 0 20px;
        }

        article {
            background: var(--card-bg);
            border: 1px solid #222;
            border-left: 5px solid var(--bs-red);
            padding: 25px;
            border-radius: 10px;
            margin-bottom: 30px;
            cursor: pointer;
            transition: transform 0.2s, border-color 0.2s;
        }

        article:hover {
            transform: scale(1.01);
            border-color: var(--bs-blue);
        }

        .byline {
            display: flex;
            align-items: center;
            font-size: 0.8rem;
            color: var(--text-dim);
            margin-bottom: 15px;
        }

        .pfp {
            width: 35px; height: 35px;
            border-radius: 50%;
            border: 2px solid var(--bs-blue);
            margin-right: 12px;
        }

        /* FACEBOOK STYLE IMAGE ALBUM ALBUM DISPATCH LABS */
        .album-grid {
            display: grid;
            gap: 8px;
            margin: 15px 0;
            width: 100%;
            border-radius: 8px;
            overflow: hidden;
        }

        .album-grid img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
            margin: 0 !important;
        }

        .single-image { grid-template-columns: 1fr; }
        .two-images { grid-template-columns: 1fr 1fr; height: 300px; }
        .three-images { grid-template-columns: 2fr 1fr; grid-template-rows: 1.5fr 1.5fr; height: 360px; }
        .three-images .album-item:nth-child(1) { grid-row: span 2; }
        
        .multi-images { grid-template-columns: repeat(6, 1fr); grid-template-rows: 2fr 1fr; height: 400px; }
        .multi-images .album-item:nth-child(1) { grid-column: span 3; }
        .multi-images .album-item:nth-child(2) { grid-column: span 3; }
        .multi-images .album-item:nth-child(3) { grid-column: span 2; }
        .multi-images .album-item:nth-child(4) { grid-column: span 2; }
        .multi-images .album-item:nth-child(5) { grid-column: span 2; }

        .album-item { position: relative; width: 100%; height: 100%; overflow: hidden; }
        .album-overlay {
            position: absolute;
            top:0; left:0; width:100%; height:100%;
            background: rgba(0,0,0,0.7);
            color: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.8rem;
            font-weight: bold;
            z-index: 2;
        }

        /* LIGHTBOX SYSTEM - UPGRADED EXPANSION PROFILE WITH NEON TRACKED SCROLLBAR */
        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0; top: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.92);
            backdrop-filter: blur(8px);
        }

        .modal-content {
            background: var(--card-bg);
            margin: 3% auto;
            padding: 40px;
            width: 90%;
            max-width: 900px;
            border: 2px solid var(--bs-blue);
            border-radius: 12px;
            box-shadow: var(--glow-blue);
            position: relative;
            max-height: 85vh;
            overflow-y: auto;
            box-sizing: border-box;
        }

        /* Neon-styled scrollbar for structural modal pop-up window */
        .modal-content::-webkit-scrollbar {
            width: 8px;
        }
        .modal-content::-webkit-scrollbar-track {
            background: #0d0d12;
            border-radius: 0 10px 10px 0;
        }
        .modal-content::-webkit-scrollbar-thumb {
            background: var(--bs-blue);
            border-radius: 4px;
            box-shadow: 0 0 8px var(--bs-blue);
        }

        .close-btn {
            position: absolute;
            right: 25px; top: 15px;
            font-size: 2.2rem;
            color: var(--bs-red);
            cursor: pointer;
            transition: transform 0.2s;
            z-index: 10;
        }
        .close-btn:hover { transform: scale(1.1); }

        .hidden { display: none !important; }
        .author { color: var(--bs-blue); font-weight: bold; }
        .article-body-content { font-size: 1.05rem; }
    </style>
</head>
<body>

<nav>
    <div class="nav-logo">Beat Saber // News</div>
</nav>

<div class="container">
    <main>
        <article onclick="openModal(this)">
            <header class="byline">
                <img src="https://i.pravatar.cc/100?u=1" class="pfp" alt="PFP">
                <span>By <span class="author">System</span> • May 17, 2026</span>
            </header>
            <h2>Platform Core Synchronized</h2>
            <div class="album-grid single-image">
                <img src="https://images.unsplash.com/photo-1511671782779-c97d3d27a1d4?auto=format&fit=crop&q=80&w=800" class="announcement-img" alt="Banner">
            </div>
            <div class="article-body-content">Welcome to the revised infrastructure dashboard. New posts made via the administrative dashboard override chronological stack depth metrics directly.</div>
        </article>
    </main>
</div>

<div id="newsModal" class="modal">
    <div class="modal-content">
        <span class="close-btn" onclick="closeModal()">&times;</span>
        <div id="modalBody"></div>
    </div>
</div>

<script>
    // CORE SYSTEM RUNTIME VARIABLE READOUTS
    const MAX_POSTS_LIMIT = 15;

    function openModal(element) {
        const modal = document.getElementById("newsModal");
        const modalBody = document.getElementById("modalBody");
        
        // Clone structure to preserve parent context styling rules
        modalBody.innerHTML = element.innerHTML;
        
        // Expose nested image arrays hidden within structural bounds
        const hiddenAlbumPool = modalBody.querySelector('.hidden-album-pool');
        if (hiddenAlbumPool) {
            hiddenAlbumPool.classList.remove('hidden');
            hiddenAlbumPool.style.display = 'grid';
            hiddenAlbumPool.style.gridTemplateColumns = 'repeat(auto-fill, minmax(200px, 1fr))';
            hiddenAlbumPool.style.gap = '8px';
            hiddenAlbumPool.style.marginTop = '15px';
            
            const underlyingImages = hiddenAlbumPool.querySelectorAll('img.hidden');
            underlyingImages.forEach(img => img.classList.remove('hidden'));
        }

        const overlayText = modalBody.querySelector('.album-overlay');
        if(overlayText) overlayText.remove();

        const concealedElements = modalBody.querySelectorAll('.hidden');
        concealedElements.forEach(el => el.classList.remove('hidden'));
        
        modal.style.display = "block";
    }

    function closeModal() {
        document.getElementById("newsModal").style.display = "none";
    }

    window.onclick = function(event) {
        const modal = document.getElementById("newsModal");
        if (event.target == modal) { closeModal(); }
    }
</script>

</body>
</html>
