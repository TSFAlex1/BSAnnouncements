<!DOCTYPE html>
<html lang="en"><head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BS Announcements</title>
    <link rel="icon" type="image/png" href="BS-Announcements-Icon.png">
    <style>
        :root {
            --bs-blue: #00d4ff;
            --bs-red: #ff003c;
            --bg-dark: #070709;
            --card-bg: #111115;
            --text-main: #e2e8f0;
            --text-muted: #64748b;
            --glow-blue: 0 0 15px rgba(0, 212, 255, 0.3);
            --glow-red: 0 0 15px rgba(255, 0, 60, 0.3);
        }

        * { box-sizing: border-box; }

        body {
            background-color: var(--bg-dark);
            color: var(--text-main);
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            margin: 0;
            padding: 0;
            line-height: 1.6;
            -webkit-tap-highlight-color: transparent;
        }

        /* HEADER & BRANDING NAVIGATION */
        header.global-nav {
            background: rgba(17, 17, 21, 0.8);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-bottom: 1px solid #1f1f2e;
            position: sticky;
            top: 0;
            z-index: 100;
            padding: 12px 16px;
        }

        .nav-container {
            max-width: 800px;
            margin: 0 auto;
            display: flex;
            align-items: center;
            justify-content: space-between; /* Adjusted for Search bar */
            gap: 12px;
        }

        .nav-branding {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .nav-logo {
            width: 35px;
            height: 35px;
            object-fit: contain;
            filter: drop-shadow(var(--glow-blue));
        }

        .nav-title {
            font-size: 1.15rem;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            font-weight: 800;
            color: #ffffff;
            margin: 0;
            text-shadow: var(--glow-blue);
        }

        /* DYNAMIC SEARCH BAR */
        .search-wrapper {
            position: relative;
            flex: 1;
            max-width: 300px;
        }

        #announcementSearch {
            width: 100%;
            background: rgba(5, 5, 7, 0.6);
            border: 1px solid #2e2e3f;
            border-radius: 20px;
            padding: 8px 15px;
            color: #fff;
            font-size: 0.85rem;
            outline: none;
            transition: all 0.2s;
        }

        #announcementSearch:focus {
            border-color: var(--bs-blue);
            box-shadow: var(--glow-blue);
            background: #050507;
        }

        /* GAME UTILITY BUTTONS (BeatSaver/ScoreSaber) */
        .game-utils {
            display: flex;
            gap: 10px;
            margin-top: 15px;
            flex-wrap: wrap;
        }

        .util-btn {
            background: #000;
            border: 1px solid var(--bs-blue);
            color: var(--bs-blue);
            padding: 6px 12px;
            border-radius: 4px;
            font-size: 0.75rem;
            font-weight: 800;
            text-transform: uppercase;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            transition: all 0.2s;
        }

        .util-btn:hover {
            background: var(--bs-blue);
            color: #000;
            box-shadow: var(--glow-blue);
        }

        .util-btn.scoresaber {
            border-color: #fca311;
            color: #fca311;
        }

        .util-btn.scoresaber:hover {
            background: #fca311;
            color: #000;
            box-shadow: 0 0 10px rgba(252, 163, 17, 0.4);
        }

        /* TIMELINE STRUCTURE */
        main {
            max-width: 800px;
            margin: 24px auto;
            padding: 0 16px;
        }

        article {
            background: var(--card-bg);
            border: 1px solid #1f1f2e;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 24px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            transition: border-color 0.2s;
        }

        article:hover { border-color: #2e2e45; }

        .byline { display: flex; align-items: center; gap: 10px; margin-bottom: 16px; }
        .pfp { width: 32px; height: 32px; border-radius: 50%; object-fit: cover; border: 1px solid var(--bs-blue); }
        .pfp.hidden { display: none; }
        .byline span { font-size: 0.8rem; color: var(--text-muted); }
        .author { color: #ffffff; font-weight: 600; }

        h2 { font-size: 1.35rem; color: #ffffff; margin: 0 0 12px 0; font-weight: 700; letter-spacing: -0.3px; }

        .album-grid {
            position: relative;
            width: 100%;
            background: #050507;
            border-radius: 8px;
            border: 1px solid #1f1f2e;
            margin-bottom: 16px;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
        }

        .announcement-img { max-width: 100%; height: auto; max-height: 400px; display: block; object-fit: contain; }

        .view-all-btn {
            position: absolute; right: 12px; bottom: 12px;
            background: rgba(0, 0, 0, 0.85); color: #ffffff;
            border: 1px solid var(--bs-blue); padding: 8px 14px;
            font-size: 0.75rem; font-weight: bold;
            text-transform: uppercase; letter-spacing: 0.5px;
            border-radius: 6px; cursor: pointer;
            backdrop-filter: blur(4px); box-shadow: var(--glow-blue);
            transition: all 0.2s ease; display: flex;
            align-items: center; gap: 6px; z-index: 5;
        }

        .view-all-btn:hover { background: var(--bs-blue); color: #000000; box-shadow: 0 0 20px rgba(0, 212, 255, 0.6); }

        .article-body-content { font-size: 0.95rem; color: #cbd5e1; word-break: break-word; }
        .article-body-content p { margin: 0 0 12px 0; }

        /* LIGHTBOX */
        .lightbox-modal {
            display: none; position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(4, 4, 6, 0.98); z-index: 1000;
            justify-content: center; align-items: center;
            opacity: 0; transition: opacity 0.2s ease;
        }
        .lightbox-modal.show { display: flex; opacity: 1; }
        .lightbox-viewer-img { max-width: 100%; max-height: 75vh; object-fit: contain; border-radius: 4px; box-shadow: 0 0 30px rgba(0,0,0,0.8); }
        .lightbox-btn {
            position: absolute; background: rgba(17, 17, 21, 0.85);
            border: 1px solid #2e2e3f; color: #ffffff;
            width: 44px; height: 44px; border-radius: 50%;
            font-size: 1.25rem; cursor: pointer;
            display: flex; justify-content: center; align-items: center;
            transition: all 0.2s; z-index: 1010;
        }
        .lightbox-btn:hover { border-color: var(--bs-blue); color: var(--bs-blue); box-shadow: var(--glow-blue); }
        .lightbox-prev { left: 16px; top: 50%; transform: translateY(-50%); }
        .lightbox-next { right: 16px; top: 50%; transform: translateY(-50%); }
        .lightbox-close { top: 16px; right: 16px; border-color: var(--bs-red); color: var(--bs-red); }
        .lightbox-close:hover { background: var(--bs-red); color: #fff; box-shadow: var(--glow-red); }

        @media (max-width: 600px) {
            .nav-container { flex-direction: column; align-items: flex-start; gap: 8px; }
            .search-wrapper { max-width: 100%; width: 100%; }
        }
    </style>
</head>
<body>

    <header class="global-nav">
        <div class="nav-container">
            <div class="nav-branding">
                <img src="BS-Announcements-Icon.png" class="nav-logo" alt="Logo">
                <h1 class="nav-title">BS Announcements</h1>
            </div>
            <div class="search-wrapper">
                <input type="text" id="announcementSearch" placeholder="Search news, authors, or maps..." oninput="filterAnnouncements()">
            </div>
        </div>
    </header>

    <main id="announcementContainer"></main>

    <div id="globalLightbox" class="lightbox-modal">
        <div class="lightbox-content-wrapper">
            <button class="lightbox-btn lightbox-close" onclick="closeLightbox()">&times;</button>
            <button class="lightbox-btn lightbox-prev" onclick="navigateLightbox(-1)">&#8249;</button>
            <img id="lightboxTargetImg" class="lightbox-viewer-img" src="" alt="View">
            <button class="lightbox-btn lightbox-next" onclick="navigateLightbox(1)">&#8250;</button>
            <div id="lightboxCounter" class="lightbox-counter">1 / 1</div>
        </div>
    </div>

    <script>
        let announcements = [];
        let activeImageArray = [];
        let activeImageIndex = 0;

        async function fetchAnnouncements() {
            const container = document.getElementById('announcementContainer');
            container.innerHTML = '<div style="text-align:center; padding:50px; color:var(--bs-blue);">Syncing Timeline...</div>';
            
            try {
                const response = await fetch('https://raw.githubusercontent.com/TSFAlex/TSFAlexHub/refs/heads/main/Data.json');
                const data = await response.json();
                announcements = data.announcements.reverse();
                renderAnnouncements(announcements);
            } catch (err) {
                container.innerHTML = '<div style="text-align:center; padding:50px; color:var(--bs-red);">Failed to load timeline. Check connection.</div>';
            }
        }

        function renderAnnouncements(data) {
            const container = document.getElementById('announcementContainer');
            container.innerHTML = '';

            data.forEach(item => {
                const imgList = item.img ? item.img.split(',').map(url => url.trim()) : [];
                const hasImages = imgList.length > 0 && !item.hideImg;
                
                // DETECT GAME LINKS (BeatSaver !bsr and ScoreSaber)
                let utilityHtml = '';
                const bsrMatch = item.desc.match(/!bsr\s+([a-fA-F0-9]+)/i);
                const ssMatch = item.desc.match(/scoresaber\.com\/u\/(\d+)/i);

                if (bsrMatch) {
                    const key = bsrMatch[1];
                    utilityHtml += `
                        <div class="game-utils">
                            <a href="beatsaver://${key}" class="util-btn"> One-Click Install (${key})</a>
                            <a href="https://beatsaver.com/maps/${key}" target="_blank" class="util-btn">View on BeatSaver</a>
                        </div>
                    `;
                }
                if (ssMatch) {
                    utilityHtml += `
                        <div class="game-utils" style="margin-top:5px;">
                            <a href="https://scoresaber.com/u/${ssMatch[1]}" target="_blank" class="util-btn scoresaber">ScoreSaber Profile</a>
                        </div>
                    `;
                }

                const article = document.createElement('article');
                article.innerHTML = `
                    <div class="byline">
                        <img src="${item.pfp || 'https://i.pravatar.cc/100'}" class="pfp ${item.hidePfp ? 'hidden' : ''}">
                        <div>
                            <span class="author">${item.author}</span><br>
                            <span>${item.date}</span>
                        </div>
                    </div>
                    <h2>${item.title}</h2>
                    ${hasImages ? `
                        <div class="album-grid" onclick='openLightbox(${JSON.stringify(imgList)})'>
                            <img src="${imgList[0]}" class="announcement-img">
                            ${imgList.length > 1 ? `<div class="view-all-btn">+${imgList.length - 1} More Images</div>` : ''}
                        </div>
                    ` : ''}
                    <div class="article-body-content">${item.desc}</div>
                    ${utilityHtml}
                `;
                container.appendChild(article);
            });
        }

        function filterAnnouncements() {
            const query = document.getElementById('announcementSearch').value.toLowerCase();
            const filtered = announcements.filter(item => 
                item.title.toLowerCase().includes(query) || 
                item.author.toLowerCase().includes(query) || 
                item.desc.toLowerCase().includes(query)
            );
            renderAnnouncements(filtered);
        }

        // LIGHTBOX LOGIC
        function openLightbox(imgArray) {
            activeImageArray = imgArray;
            activeImageIndex = 0;
            renderLightboxFrame();
            const modal = document.getElementById('globalLightbox');
            modal.style.display = 'flex';
            setTimeout(() => modal.classList.add('show'), 10);
            document.body.style.overflow = 'hidden';
        }

        function renderLightboxFrame() {
            document.getElementById('lightboxTargetImg').src = activeImageArray[activeImageIndex];
            document.getElementById('lightboxCounter').innerText = `${activeImageIndex + 1} / ${activeImageArray.length}`;
        }

        function navigateLightbox(direction) {
            activeImageIndex += direction;
            if (activeImageIndex >= activeImageArray.length) activeImageIndex = 0;
            if (activeImageIndex < 0) activeImageIndex = activeImageArray.length - 1;
            renderLightboxFrame();
        }

        function closeLightbox() {
            const modal = document.getElementById('globalLightbox');
            modal.classList.remove('show');
            setTimeout(() => modal.style.display = 'none', 200);
            document.body.style.overflow = '';
        }

        window.onload = fetchAnnouncements;
    </script>
</body>
</html>
