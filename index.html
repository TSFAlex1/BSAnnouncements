<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Beat Saber Hub</title>
    <style>
        :root {
            --bs-blue: #00d4ff;
            --bs-red: #ff003c;
            --bg-dark: #050505;
            --card-bg: #121217;
            --text-main: #e0e0e0;
            --text-dim: #999;
            --glow-blue: 0 0 15px rgba(0, 212, 255, 0.3);
            --glow-red: 0 0 15px rgba(255, 0, 60, 0.3);
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-main);
            font-family: 'Segoe UI', system-ui, sans-serif;
            margin: 0;
            line-height: 1.6;
        }

        nav {
            background: rgba(0, 0, 0, 0.8);
            border-bottom: 2px solid var(--bs-blue);
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 100;
            backdrop-filter: blur(10px);
        }

        .nav-logo {
            font-weight: 900;
            letter-spacing: 2px;
            color: #fff;
            text-transform: uppercase;
        }

        .container {
            max-width: 1100px;
            margin: 40px auto;
            display: grid;
            grid-template-columns: 1fr 320px;
            gap: 30px;
            padding: 0 20px;
        }

        @media (max-width: 850px) {
            .container { grid-template-columns: 1fr; }
        }

        article {
            background: var(--card-bg);
            border: 1px solid #222;
            border-left: 5px solid var(--bs-red);
            padding: 25px;
            border-radius: 10px;
            margin-bottom: 30px;
            cursor: pointer;
            transition: transform 0.2s, border-color 0.2s;
        }

        article:hover {
            transform: scale(1.01);
            border-color: var(--bs-blue);
        }

        .byline {
            display: flex;
            align-items: center;
            font-size: 0.8rem;
            color: var(--text-dim);
            margin-bottom: 15px;
        }

        .pfp {
            width: 35px; height: 35px;
            border-radius: 50%;
            border: 2px solid var(--bs-blue);
            margin-right: 12px;
        }

        .announcement-img {
            width: 100%;
            border-radius: 6px;
            margin: 15px 0;
        }

        /* SIDEBAR / BEATLEADER COMPONENT */
        .sidebar-box {
            background: var(--card-bg);
            border: 1px solid #222;
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 20px;
        }

        .sidebar-box h3 {
            margin-top: 0;
            font-size: 0.9rem;
            color: var(--bs-blue);
            text-transform: uppercase;
            border-bottom: 1px solid #23232f;
            padding-bottom: 10px;
            letter-spacing: 1px;
        }

        .map-item {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 14px;
            font-size: 0.85rem;
            border-bottom: 1px solid #181822;
            padding-bottom: 10px;
        }
        .map-item:last-child { border-bottom: none; margin-bottom: 0; padding-bottom: 0; }

        .map-cover {
            width: 45px;
            height: 45px;
            border-radius: 4px;
            border: 1px solid #333;
            object-fit: cover;
        }

        .map-details {
            flex: 1;
            min-width: 0;
        }

        .map-title {
            color: #fff;
            font-weight: bold;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            margin-bottom: 2px;
        }

        .map-author {
            color: var(--text-dim);
            font-size: 0.75rem;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .map-stars {
            color: var(--bs-red);
            font-weight: bold;
            font-size: 0.75rem;
            text-align: right;
        }

        /* LIGHTBOX SYSTEM */
        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0; top: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.9);
            backdrop-filter: blur(5px);
        }

        .modal-content {
            background: var(--card-bg);
            margin: 5% auto;
            padding: 40px;
            width: 80%;
            max-width: 700px;
            border: 2px solid var(--bs-blue);
            border-radius: 15px;
            box-shadow: var(--glow-blue);
            position: relative;
            max-height: 80vh;
            overflow-y: auto;
        }

        .close-btn {
            position: absolute;
            right: 20px; top: 10px;
            font-size: 2rem;
            color: var(--bs-red);
            cursor: pointer;
        }

        .hidden { display: none !important; }
        .author { color: var(--bs-blue); font-weight: bold; }
    </style>
</head>
<body>

<nav>
    <div class="nav-logo">Beat Saber // News</div>
</nav>

<div class="container">
    <!-- TIMELINE ANNOUNCEMENT MATRIX -->
    <main>
        <article onclick="openModal(this)">
            <header class="byline">
                <img src="https://i.pravatar.cc/100?u=1" class="pfp" alt="PFP">
                <span>By <span class="author">System</span> • May 17, 2026</span>
            </header>
            <h2>Platform Core Synchronized</h2>
            <img src="https://images.unsplash.com/photo-1511671782779-c97d3d27a1d4?auto=format&fit=crop&q=80&w=800" class="announcement-img" alt="Banner">
            <p>Welcome to the revised infrastructure dashboard. New posts made via the administrative dashboard override chronological stack depth metrics directly.</p>
        </article>
    </main>

    <!-- LIVE BEATLEADER MAP MONITOR -->
    <aside>
        <div class="sidebar-box">
            <h3>BeatLeader Trending Maps</h3>
            <div id="trendingMapsContainer">
                <p style="color: var(--text-dim); font-size: 0.85rem;">Retrieving current live trending data...</p>
            </div>
        </div>
    </aside>
</div>

<div id="newsModal" class="modal">
    <div class="modal-content">
        <span class="close-btn" onclick="closeModal()">&times;</span>
        <div id="modalBody"></div>
    </div>
</div>

<script>
    // POPUP SYSTEM ENGINE
    function openModal(element) {
        const modal = document.getElementById("newsModal");
        const modalBody = document.getElementById("modalBody");
        modalBody.innerHTML = element.innerHTML;
        
        const hiddenElements = modalBody.querySelectorAll('.hidden');
        hiddenElements.forEach(el => el.classList.remove('hidden'));
        
        modal.style.display = "block";
    }

    function closeModal() {
        document.getElementById("newsModal").style.display = "none";
    }

    window.onclick = function(event) {
        const modal = document.getElementById("newsModal");
        if (event.target == modal) { closeModal(); }
    }

    // REAL-TIME DYNAMIC BEATLEADER ASYNC LOADER
    async function fetchTrendingMaps() {
        const container = document.getElementById('trendingMapsContainer');
        try {
            // Fetch live API ranking arrays directly from the BeatLeader endpoint
            const response = await fetch('https://api.beatleader.com/maps?sortBy=trending&page=1&count=5');
            if (!response.ok) throw new Error();
            const data = await response.json();
            
            if(data && data.data && data.data.length > 0) {
                container.innerHTML = ''; // Wipe loading feedback
                data.data.forEach(map => {
                    const stars = map.difficulty && map.difficulty[0] && map.difficulty[0].stars 
                        ? map.difficulty[0].stars.toFixed(1) + ' ★' 
                        : 'Unranked';

                    const mapHtml = `
                        <div class="map-item">
                            <img src="${map.coverImage}" class="map-cover" alt="Cover" onerror="this.src='https://via.placeholder.com/100'">
                            <div class="map-details">
                                <div class="map-title">${map.name}</div>
                                <div class="map-author">${map.mapper}</div>
                            </div>
                            <div class="map-stars">${stars}</div>
                        </div>
                    `;
                    container.innerHTML += mapHtml;
                });
            } else {
                container.innerHTML = '<p style="color:var(--text-dim); font-size:0.8rem;">No entries returned.</p>';
            }
        } catch(e) {
            container.innerHTML = '<p style="color:var(--bs-red); font-size:0.8rem;">BeatLeader link exception.</p>';
        }
    }

    // Initialize network request hooks immediately on frame construction
    fetchTrendingMaps();
</script>

</body>
</html>
